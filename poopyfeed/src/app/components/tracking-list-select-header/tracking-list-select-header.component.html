<div class="flex items-center gap-4 p-4 mb-2 border-b border-slate-200">
  <input
    type="checkbox"
    [checked]="isAllSelected()"
    (change)="toggleSelectAll.emit()"
    [class]="checkboxClass() + ' w-5 h-5 rounded cursor-pointer'"
    aria-label="Select all items"
  />
  <span class="text-sm font-['DM_Sans',sans-serif] text-slate-600">
    @if (isAllSelected()) {
      All selected
    } @else if (selectedCount() > 0) {
      {{ selectedCount() }} of {{ totalCount() }} selected
    } @else {
      Select all
    }
  </span>
</div>

<div
  class="rounded-xl hover:shadow-md transition-all bg-gradient-to-r hidden sm:block"
  [class]="bgClass()"
  [class.ring-2]="isSelected()"
  [class]="isSelected() ? ringClass() : ''"
>
  <ng-content select="[desktop]" />
</div>

<div
  class="rounded-xl hover:shadow-md transition-all bg-gradient-to-r sm:hidden p-4"
  [class]="bgClass()"
  [class.ring-2]="isSelected()"
  [class]="isSelected() ? ringClass() : ''"
>
  <ng-content select="[mobile]" />
</div>

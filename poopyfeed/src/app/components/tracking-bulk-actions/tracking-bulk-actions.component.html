<div
  class="sticky top-0 z-20 rounded-2xl p-4 border-2 shadow-lg flex items-center justify-between"
  [class]="'bg-gradient-to-r ' + gradientClass() + ' ' + borderClass()"
>
  <div class="font-['DM_Sans',sans-serif] font-semibold text-slate-900">
    {{ selectedCount() }} selected
  </div>
  <div class="flex gap-2">
    <button
      type="button"
      (click)="cancelClick.emit()"
      class="px-4 py-2 rounded-lg bg-white text-slate-700 hover:bg-slate-50 border border-slate-300 font-['DM_Sans',sans-serif] font-medium transition-colors"
      [disabled]="isDeleting()"
      aria-label="Cancel selection"
    >
      Cancel
    </button>
    <button
      type="button"
      (click)="delete.emit()"
      [disabled]="isDeleting()"
      class="px-4 py-2 rounded-lg bg-red-500 hover:bg-red-600 disabled:bg-red-300 text-white font-['DM_Sans',sans-serif] font-medium transition-colors flex items-center gap-2"
      [attr.aria-busy]="isDeleting()"
      aria-label="Delete selected items"
    >
      @if (isDeleting()) {
        <svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
      }
      Delete {{ selectedCount() }}
    </button>
  </div>
</div>

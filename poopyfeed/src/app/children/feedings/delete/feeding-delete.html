@if (error() && !feeding()) {
  <app-error-card
    [errorMessage]="error()!"
    [backRoute]="['/children', childId()!, 'feedings']"
    [backButtonText]="'Back to Feedings'"
    [gradientColor]="'rose'"
  />
}

@if (feeding()) {
  <app-delete-confirmation
    [title]="'Delete Feeding?'"
    [warningMsg]="'⚠️ This will permanently delete this feeding record' + (child() ? ' for ' + child()!.name : '') + '. This cannot be undone.'"
    [backRoute]="['/children', childId()!, 'feedings']"
    [backLabel]="'Back to Feedings'"
    [isDeleting]="isDeleting()"
    [error]="error()"
    [accentColor]="'rose'"
    (confirmed)="onConfirmDelete()"
    (cancelled)="onCancel()"
  >
    <!-- Feeding Details -->
    <div itemDetails class="bg-gradient-to-r from-rose-50 to-pink-50 border-l-4 border-rose-500 p-4 mb-6 rounded-xl">
      <div class="flex items-start gap-3">
        <span class="text-3xl">{{ feeding()!.feeding_type === 'bottle' ? '🍼' : '🤱' }}</span>
        <div>
          <p class="font-['DM_Sans',sans-serif] font-bold text-slate-900">
            {{ getFeedingDetails(feeding()!) }}
          </p>
          <p class="font-['DM_Sans',sans-serif] text-sm text-slate-600 mt-1">
            {{ formatDateTime(feeding()!.fed_at) }}
          </p>
          @if (feeding()!.notes) {
            <p class="font-['DM_Sans',sans-serif] text-sm text-slate-600 mt-2 italic">
              "{{ feeding()!.notes }}"
            </p>
          }
        </div>
      </div>
    </div>
  </app-delete-confirmation>
}

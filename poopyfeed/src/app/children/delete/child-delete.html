@if (error() && !child()) {
  <app-error-card
    [errorMessage]="error()!"
    [backRoute]="'/children'"
    [backButtonText]="'Back to My Children'"
    [gradientColor]="'rose'"
  />
}

@if (child()) {
  <app-delete-confirmation
    [title]="'Delete ' + child()!.name + '?'"
    [warningMsg]="'⚠️ This will permanently delete ' + child()!.name + ' and all associated tracking data (feedings, diaper changes, and naps). This cannot be undone.'"
    [backRoute]="'/children'"
    [backLabel]="'Back to My Children'"
    [isDeleting]="isDeleting()"
    [error]="error()"
    [accentColor]="'rose'"
    (confirmed)="onConfirmDelete()"
    (cancelled)="onCancel()"
  />
}

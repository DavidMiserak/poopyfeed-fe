<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
  <!-- Diaper: Wet, Dirty, Both -->
  <div class="bg-gradient-to-br from-orange-50 to-orange-100 border-2 border-orange-200 rounded-3xl p-6 flex flex-col shadow-sm">
    <h6 class="font-['Fredoka',sans-serif] text-lg font-bold text-slate-900 mb-3">Diaper</h6>
    <div class="grid grid-cols-3 gap-2 flex-1">
      <div class="flex flex-col">
        <button
          type="button"
          (click)="quickLogWetDiaper()"
          [disabled]="isLoggingWetDiaper() || !canEdit()"
          [attr.aria-busy]="isLoggingWetDiaper()"
          aria-label="Log a wet diaper change with current timestamp"
          class="group relative p-4 min-h-[4.5rem] rounded-xl font-['DM_Sans',sans-serif] font-bold text-white shadow-lg hover:shadow-xl transition-all duration-300 hover:-translate-y-0.5 active:translate-y-0 overflow-hidden border-2 border-orange-400 no-underline cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 w-full flex flex-col items-center justify-center gap-0.5"
        >
          <span class="absolute inset-0 bg-gradient-to-br from-orange-400 to-orange-500 transition-transform duration-300 group-hover:scale-110 disabled:group-hover:scale-100"></span>
          <span class="relative z-10 flex flex-col items-center gap-1">
            @if (isLoggingWetDiaper()) {
              <svg class="w-8 h-8 animate-spin" aria-hidden="true" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
            } @else {
              <span class="text-5xl">💧</span>
            }
            <span class="text-sm">Wet</span>
          </span>
        </button>
      </div>
      <div class="flex flex-col">
        <button
          type="button"
          (click)="quickLogDirtyDiaper()"
          [disabled]="isLoggingDirtyDiaper() || !canEdit()"
          [attr.aria-busy]="isLoggingDirtyDiaper()"
          aria-label="Log a dirty diaper change with current timestamp"
          class="group relative p-4 min-h-[4.5rem] rounded-xl font-['DM_Sans',sans-serif] font-bold text-white shadow-lg hover:shadow-xl transition-all duration-300 hover:-translate-y-0.5 active:translate-y-0 overflow-hidden border-2 border-orange-400 no-underline cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 w-full flex flex-col items-center justify-center gap-0.5"
        >
          <span class="absolute inset-0 bg-gradient-to-br from-orange-400 to-orange-500 transition-transform duration-300 group-hover:scale-110 disabled:group-hover:scale-100"></span>
          <span class="relative z-10 flex flex-col items-center gap-1">
            @if (isLoggingDirtyDiaper()) {
              <svg class="w-8 h-8 animate-spin" aria-hidden="true" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
            } @else {
              <span class="text-5xl">💩</span>
            }
            <span class="text-sm">Dirty</span>
          </span>
        </button>
      </div>
      <div class="flex flex-col">
        <button
          type="button"
          (click)="quickLogBothDiaper()"
          [disabled]="isLoggingBothDiaper() || !canEdit()"
          [attr.aria-busy]="isLoggingBothDiaper()"
          aria-label="Log a wet and dirty diaper change with current timestamp"
          class="group relative p-4 min-h-[4.5rem] rounded-xl font-['DM_Sans',sans-serif] font-bold text-white shadow-lg hover:shadow-xl transition-all duration-300 hover:-translate-y-0.5 active:translate-y-0 overflow-hidden border-2 border-orange-400 no-underline cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 w-full flex flex-col items-center justify-center gap-0.5"
        >
          <span class="absolute inset-0 bg-gradient-to-br from-orange-400 to-orange-500 transition-transform duration-300 group-hover:scale-110 disabled:group-hover:scale-100"></span>
          <span class="relative z-10 flex flex-col items-center gap-1">
            @if (isLoggingBothDiaper()) {
              <svg class="w-8 h-8 animate-spin" aria-hidden="true" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
            } @else {
              <span class="text-5xl">🧷</span>
            }
            <span class="text-sm">Both</span>
          </span>
        </button>
      </div>
    </div>
  </div>

  <!-- Nap: single primary action -->
  <div class="bg-gradient-to-br from-indigo-50 to-blue-100 border-2 border-blue-200 rounded-3xl p-6 flex flex-col shadow-sm">
    <h6 class="font-['Fredoka',sans-serif] text-lg font-bold text-slate-900 mb-3">Nap</h6>
    <div class="flex-1 flex flex-col min-h-[8rem]">
      <button
        type="button"
        (click)="quickLogNap()"
        [disabled]="isLoggingNap() || !canEdit()"
        [attr.aria-busy]="isLoggingNap()"
        aria-label="Log a nap with current timestamp"
        class="group relative flex-1 min-h-[8rem] p-6 rounded-2xl font-['DM_Sans',sans-serif] font-bold text-white shadow-lg hover:shadow-xl transition-all duration-300 hover:-translate-y-0.5 active:translate-y-0 overflow-hidden border-2 border-blue-400 no-underline cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 w-full flex flex-col items-center justify-center gap-2"
      >
        <span class="absolute inset-0 bg-gradient-to-br from-blue-400 to-indigo-500 transition-transform duration-300 group-hover:scale-110 disabled:group-hover:scale-100"></span>
        <span class="relative z-10 flex flex-col items-center gap-2">
          @if (isLoggingNap()) {
            <svg class="w-10 h-10 animate-spin" aria-hidden="true" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          } @else {
            <span class="text-6xl">😴</span>
          }
          <span class="text-xl">Log nap</span>
        </span>
      </button>
    </div>
  </div>

  <!-- Bottle: low, mid, high oz -->
  <div class="bg-gradient-to-br from-rose-50 to-rose-100 border-2 border-rose-200 rounded-3xl p-6 flex flex-col shadow-sm">
    <h6 class="font-['Fredoka',sans-serif] text-lg font-bold text-slate-900 mb-3">Bottle</h6>
    <div class="grid grid-cols-3 gap-2 flex-1">
      <div class="flex flex-col">
        <button
          type="button"
          (click)="quickLogBottleLow()"
          [disabled]="isLoggingBottleLow() || !canEdit() || !bottleAmountLow()"
          [attr.aria-busy]="isLoggingBottleLow()"
          [attr.aria-label]="bottleAmountLow() ? `Log a bottle feeding with ${bottleAmountLow()} oz` : 'Bottle amount not available'"
          class="group relative p-4 min-h-[4.5rem] rounded-xl font-['DM_Sans',sans-serif] font-bold text-white shadow-lg hover:shadow-xl transition-all duration-300 hover:-translate-y-0.5 active:translate-y-0 overflow-hidden border-2 border-rose-400 no-underline cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 w-full flex flex-col items-center justify-center gap-0.5"
        >
          <span class="absolute inset-0 bg-gradient-to-br from-rose-300 to-rose-400 transition-transform duration-300 group-hover:scale-110 disabled:group-hover:scale-100"></span>
          <span class="relative z-10 flex flex-col items-center gap-1">
            @if (isLoggingBottleLow()) {
              <svg class="w-8 h-8 animate-spin" aria-hidden="true" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
            } @else {
              <span class="text-5xl">🍼</span>
            }
            @if (bottleAmountLow()) {
              <span class="text-2xl font-bold">{{ bottleAmountLow() }}</span>
              <span class="text-sm opacity-90">oz</span>
            }
          </span>
        </button>
      </div>
      <div class="flex flex-col">
        <button
          type="button"
          (click)="quickLogBottleMid()"
          [disabled]="isLoggingBottleMid() || !canEdit() || !bottleAmountMid()"
          [attr.aria-busy]="isLoggingBottleMid()"
          [attr.aria-label]="bottleAmountMid() ? `Log a bottle feeding with ${bottleAmountMid()} oz (recommended)` : 'Bottle amount not available'"
          class="group relative p-4 min-h-[4.5rem] rounded-xl font-['DM_Sans',sans-serif] font-bold text-white shadow-lg hover:shadow-xl transition-all duration-300 hover:-translate-y-0.5 active:translate-y-0 overflow-hidden border-2 border-rose-400 no-underline cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 w-full flex flex-col items-center justify-center gap-0.5"
        >
          <span class="absolute inset-0 bg-gradient-to-br from-rose-400 to-rose-500 transition-transform duration-300 group-hover:scale-110 disabled:group-hover:scale-100"></span>
          <span class="relative z-10 flex flex-col items-center gap-1">
            @if (isLoggingBottleMid()) {
              <svg class="w-8 h-8 animate-spin" aria-hidden="true" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
            } @else {
              <span class="text-5xl">🍼</span>
            }
            @if (bottleAmountMid()) {
              <span class="text-2xl font-bold">{{ bottleAmountMid() }}</span>
              <span class="text-sm opacity-90">oz</span>
            }
          </span>
        </button>
      </div>
      <div class="flex flex-col">
        <button
          type="button"
          (click)="quickLogBottleHigh()"
          [disabled]="isLoggingBottleHigh() || !canEdit() || !bottleAmountHigh()"
          [attr.aria-busy]="isLoggingBottleHigh()"
          [attr.aria-label]="bottleAmountHigh() ? `Log a bottle feeding with ${bottleAmountHigh()} oz` : 'Bottle amount not available'"
          class="group relative p-4 min-h-[4.5rem] rounded-xl font-['DM_Sans',sans-serif] font-bold text-white shadow-lg hover:shadow-xl transition-all duration-300 hover:-translate-y-0.5 active:translate-y-0 overflow-hidden border-2 border-rose-400 no-underline cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0 w-full flex flex-col items-center justify-center gap-0.5"
        >
          <span class="absolute inset-0 bg-gradient-to-br from-rose-300 to-rose-400 transition-transform duration-300 group-hover:scale-110 disabled:group-hover:scale-100"></span>
          <span class="relative z-10 flex flex-col items-center gap-1">
            @if (isLoggingBottleHigh()) {
              <svg class="w-8 h-8 animate-spin" aria-hidden="true" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
            } @else {
              <span class="text-5xl">🍼</span>
            }
            @if (bottleAmountHigh()) {
              <span class="text-2xl font-bold">{{ bottleAmountHigh() }}</span>
              <span class="text-sm opacity-90">oz</span>
            }
          </span>
        </button>
      </div>
    </div>
  </div>
</div>

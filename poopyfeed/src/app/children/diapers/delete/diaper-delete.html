@if (error() && !diaper()) {
  <app-error-card
    [errorMessage]="error()!"
    [backRoute]="['/children', childId()!, 'diapers']"
    [backButtonText]="'Back to Diaper Changes'"
    [gradientColor]="'orange'"
  />
}

@if (diaper()) {
  <app-delete-confirmation
    [title]="'Delete Diaper Change?'"
    [warningMsg]="'⚠️ This will permanently delete this diaper change record' + (child() ? ' for ' + child()!.name : '') + '. This cannot be undone.'"
    [backRoute]="['/children', childId()!, 'diapers']"
    [backLabel]="'Back to Diaper Changes'"
    [isDeleting]="isDeleting()"
    [error]="error()"
    [accentColor]="'orange'"
    (confirmed)="onConfirmDelete()"
    (cancelled)="onCancel()"
  >
    <!-- Diaper Details -->
    <div itemDetails class="bg-gradient-to-r from-orange-50 to-amber-50 border-l-4 border-orange-500 p-4 mb-6 rounded-xl">
      <div class="flex items-start gap-3">
        <span class="text-3xl">{{ getDiaperIcon(diaper()!.change_type) }}</span>
        <div>
          <p class="font-['DM_Sans',sans-serif] font-bold text-slate-900">
            {{ getDiaperTitle(diaper()!.change_type) }}
          </p>
          <p class="font-['DM_Sans',sans-serif] text-sm text-slate-600 mt-1">
            {{ formatDateTime(diaper()!.changed_at) }}
          </p>
          @if (diaper()!.notes) {
            <p class="font-['DM_Sans',sans-serif] text-sm text-slate-600 mt-2 italic">
              "{{ diaper()!.notes }}"
            </p>
          }
        </div>
      </div>
    </div>
  </app-delete-confirmation>
}

<div class="min-h-screen relative bg-gradient-to-br from-rose-50 via-amber-50 to-orange-50 overflow-hidden">
  <!-- Decorative background elements (static, Tailwind only) -->
  <div class="absolute inset-0 opacity-10 pointer-events-none">
    <div class="absolute top-20 left-20 w-64 h-64 bg-gradient-to-br from-rose-400 to-orange-400 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 right-20 w-96 h-96 bg-gradient-to-br from-amber-400 to-orange-400 rounded-full blur-3xl"></div>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 relative z-10">
    <!-- Back link -->
    <div class="mb-6">
      <a
        (click)="goBack()"
        (keydown.enter)="goBack()"
        (keydown.space)="goBack()"
        class="font-['DM_Sans',sans-serif] text-sm text-slate-600 hover:text-rose-400 transition-colors font-medium cursor-pointer inline-flex items-center gap-2"
        tabindex="0"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Back to Advanced
      </a>
    </div>

    <!-- Export dialog or job status -->
    @if (!showJobStatus()) {
      <!-- Export Dialog (full page) -->
      <div class="flex justify-center">
        <app-export-dialog
          [isSubmitting]="isExporting()"
          (submitEvent)="onExportDialogSubmit($event)"
          (cancelEvent)="onExportDialogCancel()"
        />
      </div>
    } @else if (jobTaskId(); as taskId) {
      <!-- Job Status Polling (full page) -->
      <div class="flex justify-center">
        <app-export-job-status
          [taskId]="taskId"
          [childId]="childId()!"
          (dismissEvent)="onJobStatusDismiss()"
        />
      </div>
    }
  </div>
</div>

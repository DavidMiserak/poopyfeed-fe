<div class="bg-white/80 backdrop-blur-lg rounded-2xl sm:rounded-3xl shadow-lg p-4 sm:p-6">
  <h2 class="font-['Fredoka',sans-serif] text-lg sm:text-2xl font-semibold text-gray-800 mb-3 sm:mb-4">
    Feeding Trends (30 Days)
  </h2>
  @if (isLoading()) {
    <div class="flex items-center justify-center py-12">
      <svg
        class="w-12 h-12 animate-spin text-orange-500"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
      >
        <circle
          class="opacity-25"
          cx="12"
          cy="12"
          r="10"
          stroke="currentColor"
          stroke-width="4"
        ></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
    </div>
  } @else if (!hasData()) {
    <div class="flex flex-col items-center justify-center py-12 text-gray-400">
      <span class="text-5xl mb-3">🍼</span>
      <p class="font-['Fredoka',sans-serif] text-lg font-medium text-gray-500">No feeding data yet</p>
      <p class="text-sm text-gray-400 mt-1">Start logging feedings to see trends here</p>
    </div>
  } @else {
    <canvas #chartCanvas></canvas>
  }
</div>

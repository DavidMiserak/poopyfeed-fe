<p class="font-['DM_Sans',sans-serif] text-slate-600 mb-4">
  What best describes what's going on? Choose one.
</p>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4" role="group" aria-label="Symptom type">
  @for (symptom of visibleSymptoms(); track symptom.id) {
    <button
      type="button"
      (click)="select(symptom.id)"
      [attr.aria-pressed]="isSelected(symptom.id)"
      [class.ring-2]="isSelected(symptom.id)"
      [class.ring-rose-500]="isSelected(symptom.id)"
      [class.bg-rose-50]="isSelected(symptom.id)"
      [class.border-rose-300]="isSelected(symptom.id)"
      class="min-h-[44px] p-4 rounded-2xl border-2 text-left font-['DM_Sans',sans-serif] transition-colors cursor-pointer border-slate-200 bg-white hover:border-rose-200 hover:bg-rose-50/50 focus:outline-none focus-visible:ring-2 focus-visible:ring-rose-500 focus-visible:ring-offset-2"
    >
      <span class="font-['Fredoka',sans-serif] text-lg font-bold text-slate-900 block">
        {{ symptom.label }}
      </span>
      <span class="text-sm text-slate-600">{{ symptom.description }}</span>
    </button>
  }
</div>
